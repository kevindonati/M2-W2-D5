<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Netflix | Profilo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-black mx-4">
    <header>
      <a href="./index.html">
        <img
          src="./assets/img/netflix_logo.png"
          alt="Logo Netflix"
          width="10%"
          class="mt-3"
        />
      </a>
    </header>
    <main>
      <div class="container">
        <div class="row offset-lg-3">
          <div class="col-12 col-lg-8 p-0">
            <h1 class="text-light fs-1 m-0">Edit Profile</h1>
            <hr class="border-0 bg-secondary mt-2 mb-4" style="height: 2px" />
            <div class="row">
              <div class="col-3 position-relative h-100 p-0">
                <img
                  src="./assets/img/avatar.png"
                  alt="Foto profilo"
                  width="100%"
                />
                <a href="#"
                  ><svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="25"
                    height="25"
                    fill="currentColor"
                    class="bi bi-pencil-fill position-absolute bottom-0 start-0 mb-2 ms-1 p-1 border rounded-circle bg-black text-light"
                    viewBox="0 0 16 16"
                  >
                    <path
                      d="M12.854.146a.5.5 0 0 0-.707 0L10.5 1.793 14.207 5.5l1.647-1.646a.5.5 0 0 0 0-.708zm.646 6.061L9.793 2.5 3.293 9H3.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.207zm-7.468 7.468A.5.5 0 0 1 6 13.5V13h-.5a.5.5 0 0 1-.5-.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.5-.5V10h-.5a.5.5 0 0 1-.175-.032l-.179.178a.5.5 0 0 0-.11.168l-2 5a.5.5 0 0 0 .65.65l5-2a.5.5 0 0 0 .168-.11z"
                    /></svg
                ></a>
              </div>
              <div class="col-8">
                <!-- <input
                  type="text"
                  placeholder="Strive Student"
                  class="bg-secondary border-0 text-light"
                /> 
                non riesco a cambiare colore del testo all'input-->
                <p class="text-light bg-secondary py-2 ps-3 fs-5">
                  Strive Student
                </p>

                <p class="text-secondary fs-4 m-0 mt-4 text-end text-md-start">
                  Language:
                </p>

                <div class="dropdown text-end text-md-start">
                  <button
                    class="btn btn-black dropdown-toggle text-light rounded-0 border-1 border-light mt-1"
                    type="button"
                    data-bs-toggle="dropdown"
                    aria-expanded="false"
                  >
                    English
                  </button>
                  <ul class="dropdown-menu">
                    <li><a class="dropdown-item" href="#">Italian</a></li>
                    <li>
                      <a class="dropdown-item" href="#">Spanish</a>
                    </li>
                    <li>
                      <a class="dropdown-item" href="#">French</a>
                    </li>
                  </ul>
                </div>
              </div>
            </div>
            <div class="row">
              <div class="col-sm-3"></div>
              <div class="col-12 col-md-8">
                <hr
                  class="border-0 bg-secondary mt-4 mb-4"
                  style="height: 2px"
                />
                <p class="text-secondary fs-4 m-0">Maturity Settings:</p>
                <button type="button" class="btn btn-secondary rounded-1 my-3">
                  ALL MATURITY SETTINGS
                </button>
                <p class="text-light m-0">
                  Show titles of
                  <span class="fw-bold">all maturity ratings</span> for this
                  profile.
                </p>
                <button
                  type="button"
                  class="btn btn-outline-secondary rounded-0 px-4 my-4"
                >
                  EDIT
                </button>
                <hr
                  class="border-0 bg-secondary mt-2 mb-4"
                  style="height: 2px"
                />
                <p class="text-secondary fs-4 m-0">Autoplay controls</p>
                <div class="form-check text-light d-flex">
                  <input
                    class="form-check-input bg-black border-secondary"
                    type="checkbox"
                    value=""
                    id="checkDefault"
                    style="height: 35px; width: 35px"
                    checked
                  />
                  <label
                    class="form-check-label ms-2 d-flex flex-wrap align-content-center"
                    for="checkDefault"
                  >
                    Autoplay next episode in a series on all devices.
                  </label>
                </div>
                <div class="form-check text-light d-flex">
                  <input
                    class="form-check-input bg-black border-secondary"
                    type="checkbox"
                    value=""
                    id="checkChecked"
                    style="height: 35px; width: 35px"
                    checked
                  />
                  <label
                    class="form-check-label ms-2 d-flex flex-wrap align-content-center"
                    for="checkChecked"
                  >
                    Autoplay previews while browsing on all devices.
                  </label>
                </div>
              </div>
            </div>
            <hr class="border-0 bg-secondary mt-4 mb-4" style="height: 2px" />
            <div class="row">
              <div class="col-6 col-lg-3">
                <button
                  type="button"
                  class="btn btn-outline-secondary rounded-0 w-100"
                >
                  SAVE
                </button>
              </div>

              <div class="col-6 col-lg-3">
                <button
                  type="button"
                  class="btn btn-outline-secondary rounded-0 w-100"
                >
                  CANCEL
                </button>
              </div>

              <div class="col-12 col-lg-6 mt-3 mt-lg-0">
                <button
                  type="button"
                  class="btn btn-outline-secondary rounded-0 w-100"
                >
                  DELETE PROFILE
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
